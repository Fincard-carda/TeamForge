# Hierarchy and permissions policies - generated by the setup wizard
_defaults:
  leader:
    can_request_new_agent: true
    can_approve_budget: false
    can_escalate_to_user: true
    writes_code: false
    allow_subagent_spawn: true
    tools_baseline:
    - knowledge.read_docs
    - knowledge.list_artifacts
    - knowledge.read_artifact
    - knowledge.write_decision
    - brief.save
    - brief.load
    - delegate.check_result
    - delegate.read_inbox
    - viz.table
    - viz.kpi_card
  worker:
    can_request_new_agent: false
    can_approve_budget: false
    can_escalate_to_user: false
    writes_code: true
    allow_subagent_spawn: false
    tools_baseline:
    - code.read_file
    - code.write_file
    - code.list_dir
    - knowledge.read_docs
    - knowledge.read_artifact
    - brief.save
    - brief.load
roles:
  ceo:
    delegate_to:
    - cfo
    - tech_lead
    can_request_new_agent: true
    can_approve_budget: true
    can_escalate_to_user: true
    writes_code: false
    allow_subagent_spawn: true
    tools:
    - knowledge.read_docs
    - knowledge.list_artifacts
    - knowledge.read_artifact
    - knowledge.write_decision
    - brief.save
    - brief.load
    - delegate.check_result
    - delegate.read_inbox
    - viz.table
    - viz.kpi_card
    - delegate.to_cfo
    - delegate.to_tech_lead
    - budget.get_report
    - budget.log_expense
    - budget.sync_from_analytics
    - budget.request_user_approval
    - analytics.usage_check
    - analytics.cost_report
    - analytics.usage_report
  cfo:
    delegate_to: []
    can_request_new_agent: true
    can_approve_budget: false
    can_escalate_to_user: true
    writes_code: false
    allow_subagent_spawn: true

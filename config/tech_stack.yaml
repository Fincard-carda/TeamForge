# TeamForge tech stack - generated by the setup wizard
project:
  name: Browser Extension Message Channel Debugger
  domain: devtools
  summary: A developer tool focused on diagnosing and resolving browser extension
    messaging issues, particularly the common 'message channel closed before a response
    was received' error. The tool will provide debugging utilities, linting rules,
    and runtime diagnostics for Chrome/Firefox extension developers to identify mishandled
    async message listeners, orphaned ports, and lifecycle mismatches in their extension
    code.
  compliance: []
tech_stack:
  backend: Node.js with TypeScript for CLI tooling and static analysis engine
  frontend: React with TypeScript for the DevTools panel extension UI
  mobile: ''
  data: SQLite for local session storage and diagnostic logs
  infra: GitHub Actions for CI/CD, Chrome Web Store and Firefox Add-ons for distribution

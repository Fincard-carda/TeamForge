# TeamForge tech stack - generated by the setup wizard
project:
  name: ArtistShop
  domain: ecommerce
  summary: An online portfolio and e-commerce website for an individual artist to
    showcase and sell their artworks. The platform will feature a gallery with high-quality
    images, a shopping cart, secure payment processing, and an admin panel for the
    artist to manage inventory, orders, and content.
  compliance:
  - PCI-DSS
  - GDPR
tech_stack:
  backend: Node.js with Express and Stripe for payment processing
  frontend: Next.js with Tailwind CSS for a responsive, visually rich storefront
  mobile: ''
  data: PostgreSQL with Prisma ORM, Cloudinary for image hosting
  infra: Vercel for frontend hosting, Railway or Render for backend, GitHub Actions
    for CI/CD
